name: CI

on:
  push:
    branches:
      - main
      - develop
      - 'release/**'
  pull_request:
    branches:
      - '**'
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  quality:
    name: Lint + Build (Node ${{ matrix.node }})
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        node: [20, 22]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

  changes:
    name: Validate file changes for PR
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      pull-requests: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Ensure lockfile is updated with package changes
        run: |
          set -euo pipefail
          if git diff --name-only HEAD^ HEAD | grep -q '^package.json$'; then
            if ! git diff --name-only HEAD^ HEAD | grep -q '^package-lock.json$'; then
              echo "package.json changed but package-lock.json was not updated."
              exit 1
            fi
          fi

  status:
    name: CI Status
    if: always()
    runs-on: ubuntu-latest
    needs:
      - quality
      - changes
    steps:
      - name: Verify all required jobs passed
        run: |
          set -euo pipefail
          quality_result="${{ needs.quality.result }}"
          changes_result="${{ needs.changes.result }}"

          if [ "$changes_result" = "skipped" ]; then
            changes_result="success"
          fi

          echo "quality: $quality_result"
          echo "changes: $changes_result"

          if [ "$quality_result" != "success" ] || [ "$changes_result" != "success" ]; then
            echo "One or more jobs failed"
            exit 1
          fi
